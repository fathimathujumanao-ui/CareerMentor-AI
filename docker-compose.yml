version: "3.9"

services:
  backend:
    build: ./backend
    container_name: careermentor-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: careermentor-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend